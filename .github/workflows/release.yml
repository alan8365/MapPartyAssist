name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (default: selected branch)'
        required: false
        default: ''
        type: string
      commit:
        description: 'Commit SHA to build (default: 220591f4a87ee8af4a27e00b2833e0d0a40b1f01)'
        required: false
        default: '220591f4a87ee8af4a27e00b2833e0d0a40b1f01'
        type: string
      version:
        description: 'Version to release (default: 2.4.1.3)'
        required: false
        default: '2.4.1.3'
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Resolve build target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
            version="${tag#v}"
            checkout_ref="${{ github.sha }}"
            target_commitish="${{ github.sha }}"
          else
            version="${{ inputs.version }}"
            branch="${{ inputs.branch }}"
            if [ -z "$branch" ]; then
              branch="${{ github.ref_name }}"
            fi
            commit="${{ inputs.commit }}"
            if [ -z "$commit" ]; then
              checkout_ref="$branch"
              target_commitish="$branch"
            else
              checkout_ref="$commit"
              target_commitish="$commit"
            fi
            tag="v${version}"
          fi
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref"         >> "$GITHUB_OUTPUT"
          echo "target_commitish=$target_commitish" >> "$GITHUB_OUTPUT"
          echo "Building $tag from $checkout_ref"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.checkout_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dalamudUrl = "https://goatcorp.github.io/dalamud-distrib/latest.zip"
          $dalamudDir = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dalamudDir | Out-Null
          Invoke-WebRequest -Uri $dalamudUrl -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dalamudDir -Force
          Remove-Item dalamud.zip

      - name: Build
        run: dotnet build MapPartyAssist.sln --configuration Release

      - name: Stage latest.zip
        shell: pwsh
        run: |
          $src = 'MapPartyAssist/bin/Release/MapPartyAssist/latest.zip'
          if (-not (Test-Path $src)) { throw "SDK-built plugin zip not found at $src" }
          Copy-Item $src 'latest.zip' -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          name: MapPartyAssist ${{ steps.target.outputs.tag }}
          target_commitish: ${{ steps.target.outputs.target_commitish }}
          files: latest.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
