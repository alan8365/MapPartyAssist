name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (default: selected branch)'
        required: false
        default: ''
        type: string
      commit:
        description: 'Commit SHA to build (default: selected branch head)'
        required: false
        default: ''
        type: string
      version:
        description: 'Version to release (default: 2.4.1.3)'
        required: false
        default: '2.4.1.3'
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Resolve build target
        id: target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
            version="${tag#v}"
            checkout_ref="${{ github.sha }}"
            target_commitish="${{ github.sha }}"
          else
            version="${{ inputs.version }}"
            branch="${{ inputs.branch }}"
            if [ -z "$branch" ]; then
              branch="${{ github.ref_name }}"
            fi
            commit="${{ inputs.commit }}"
            if [ -z "$commit" ]; then
              checkout_ref="$branch"
              target_commitish="$branch"
            else
              checkout_ref="$commit"
              target_commitish="$commit"
            fi
            tag="v${version}"
          fi
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref"         >> "$GITHUB_OUTPUT"
          echo "target_commitish=$target_commitish" >> "$GITHUB_OUTPUT"
          echo "Building $tag from $checkout_ref"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.checkout_ref }}

      - name: Detect Dalamud API level
        id: dalamud
        shell: pwsh
        run: |
          $csproj = Get-ChildItem -Recurse -Filter '*.csproj' | Select-Object -First 1
          $content = Get-Content $csproj.FullName -Raw
          if ($content -match 'Sdk="Dalamud\.NET\.Sdk/(\d+)\.') {
            $apiLevel = [int]$Matches[1]
          } else {
            $apiLevel = 15
          }
          $dotnetVersion = if ($apiLevel -ge 15) { '10.x' } else { '9.x' }
          $dalamudUrl = "https://goatcorp.github.io/dalamud-distrib/api${apiLevel}/latest.zip"
          Write-Host "Detected Dalamud.NET.Sdk API level $apiLevel -> .NET $dotnetVersion, $dalamudUrl"
          "api_level=$apiLevel"    >> $env:GITHUB_OUTPUT
          "dotnet_version=$dotnetVersion" >> $env:GITHUB_OUTPUT
          "dalamud_url=$dalamudUrl"       >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.dalamud.outputs.dotnet_version }}

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dalamudUrl = "${{ steps.dalamud.outputs.dalamud_url }}"
          $dalamudDir = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dalamudDir | Out-Null
          Invoke-WebRequest -Uri $dalamudUrl -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dalamudDir -Force
          Remove-Item dalamud.zip

      - name: Build
        run: dotnet build MapPartyAssist.sln --configuration Release

      - name: Stage latest.zip
        shell: pwsh
        run: |
          $src = 'MapPartyAssist/bin/Release/MapPartyAssist/latest.zip'
          if (-not (Test-Path $src)) { throw "SDK-built plugin zip not found at $src" }
          Copy-Item $src 'latest.zip' -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.target.outputs.tag }}
          name: MapPartyAssist ${{ steps.target.outputs.tag }}
          target_commitish: ${{ steps.target.outputs.target_commitish }}
          files: latest.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
